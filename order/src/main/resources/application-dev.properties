# Kafka Topics
kafka.topic.order-created=order-created
kafka.topic.order-success=order-success
kafka.topic.order-failed=order-failed

# ===================================================================
# @ConfigurationProperties
# ===================================================================
order.service.product-service-url=http://localhost:8080/v1/products/
order.service.page-size=10
order.service.async-enabled=true
order.service.cache-enabled=true
order.service.scheduling-rate-ms=60000

# ===================================================================
# RESILIENCE4J CONFIGURATION
# ===================================================================

# CircuitBreaker
resilience4j.circuitbreaker.instances.productService.sliding-window-size=10
resilience4j.circuitbreaker.instances.productService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.productService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.productService.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.productService.register-health-indicator=true

# Retry
resilience4j.retry.instances.productService.max-attempts=3
resilience4j.retry.instances.productService.wait-duration=1s

# RateLimiter
resilience4j.ratelimiter.instances.orderApi.limit-for-period=100
resilience4j.ratelimiter.instances.orderApi.limit-refresh-period=1s
resilience4j.ratelimiter.instances.orderApi.timeout-duration=0s

# Bulkhead
resilience4j.bulkhead.instances.orderApi.max-concurrent-calls=20
resilience4j.bulkhead.instances.orderApi.max-wait-duration=0s
